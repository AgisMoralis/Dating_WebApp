<form #registerForm="ngForm" (ngSubmit)="register()" autocomplete="off">
    <h2 class="text-center text-primary">Sign up</h2>
    <hr>
    <div class="mb-3 form-floating">
        <input type="text" name="username" [(ngModel)]="model.username" class="form-control" placeholder="Username">
        <label>Username</label>
    </div>
    <div class="mb-3 form-floating">
        <input type="text" name="password" [(ngModel)]="model.password" class="form-control" placeholder="Password" type="password">
        <label>Password</label>
    </div>
    <div class="form-group text-center">
        <button class="btn btn-success me-2" type="submit">Register</button>
        <button class="btn btn-default me-2" type="button" (click)="cancel()">Cancel</button>
    </div>
</form>
