<div class="text-center mt-3">
    <h2>{{getTitle()}}</h2>
</div>

<div class="container mt-3">
    <div class="td-flex">
        <div class="ms-auto mt-3 d-flex">
            <div class="form-check form-check-inline">
                <input class="form-check-input"
                       type="radio"
                       id="showLikes"
                       value="likes"
                       [(ngModel)]="predicate"
                       (change)="loadLikes()">
                <label class="form-check-label" for="showLikes">Members I like</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input"
                       type="radio"
                       id="showLikedBy"
                       value="likedBy"
                       [(ngModel)]="predicate"
                       (change)="loadLikes()">
                <label class="form-check-label" for="showLikedBy">Members who like me</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input"
                       type="radio"
                       id="showMutual"
                       value="mutual"
                       [(ngModel)]="predicate"
                       (change)="loadLikes()">
                <label class="form-check-label" for="showMutual">Mutual likes</label>
            </div>
        </div>
    </div>
</div>

<div class="row mt-3">
    @for(member of members; track member.id) {
        <div class="col-2">
            <app-member-card [member]="member"></app-member-card>
        </div>
    }
</div>
