<div class="text-center mt-3">
    <h2>{{getTitle()}}</h2>
</div>

<div class="container mt-3">
    <div class="td-flex">
        <div class="ms-auto mt-3 d-flex">
            <div class="form-check form-check-inline">
                <input class="form-check-input"
                       type="radio"
                       id="showLikes"
                       value="likes"
                       [(ngModel)]="predicate"
                       (change)="loadLikes()">
                <label class="form-check-label" for="showLikes">Members I like</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input"
                       type="radio"
                       id="showLikedBy"
                       value="likedBy"
                       [(ngModel)]="predicate"
                       (change)="loadLikes()">
                <label class="form-check-label" for="showLikedBy">Members who like me</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input"
                       type="radio"
                       id="showMutual"
                       value="mutual"
                       [(ngModel)]="predicate"
                       (change)="loadLikes()">
                <label class="form-check-label" for="showMutual">Mutual likes</label>
            </div>
        </div>
    </div>
</div>

<div class="row mt-3">
    @for(member of likesService.paginatedResult()?.items; track member.id) {
        <div class="col-2">
            <app-member-card [member]="member"></app-member-card>
        </div>
    }
</div>

@if (likesService.paginatedResult()?.pagination) {
    <div class="d-flex justify-content-center">
        <pagination
            [boundaryLinks]="true"
            [totalItems]="likesService.paginatedResult()?.pagination!.totalItems"
            [itemsPerPage]="likesService.paginatedResult()?.pagination!.itemsPerPage"
            (pageChanged)="pageChanged($event)"
            [(ngModel)]="likesService.paginatedResult()?.pagination!.currentPage"
            [maxSize]="10"
            previousText="&lsaquo;"
            nextText="&rsaquo;"
            firstText="&laquo;"
            lastText="&raquo;">

        </pagination>
    </div>
}
