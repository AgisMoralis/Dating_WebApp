<div class="row">

    <div class="text-center mt-3">
        <h2>Your matches - {{memberService.paginatedResults()?.pagination?.totalItems}}</h2>
    </div>

    <div class="container mt-3">
        <form #form="ngForm" class="d-flex mb-3" (ngSubmit)="loadMembers()">

            <div class="d-flex mx-2">
                <label class="col-form-label">Age from: </label>
                <input name="minAge"
                    type="number"
                    class="form-control ms-1"
                    style="width: 70px;"
                    [(ngModel)]="memberService.memberParams().minAge">
            </div>
            <div class="d-flex mx-2">
                <label class="col-form-label">Age to: </label>
                <input name="maxAge"
                    type="number"
                    class="form-control ms-1"
                    style="width: 70px;"
                    [(ngModel)]="memberService.memberParams().maxAge">
            </div>
            <div class="d-flex mx-2">
                <label class="col-form-label">Show: </label>
                <select name="gender"
                    class="form-select ms-1"
                    style="width: 130px;" 
                    [(ngModel)]="memberService.memberParams().gender"
                >
                    @for (gender of genderList; track gender.value) {
                        <option [value]="gender.value">
                            {{gender.display}}
                        </option>
                    }
                </select>
            </div>
            <button type="submit" class="btn btn-primary ms-1">Apply filters</button>
            <button type="button" class="btn btn-info ms-1" (click)="resetFilters()">Reset filters</button>

            <div class="ms-auto mt-3 d-flex">
                <div class="form-check form-check-inline">
                    <input class="form-check-input"
                           type="radio"
                           name="orderBy"
                           id="orderByLastActive"
                           value="lastActive"
                           [(ngModel)]="memberService.memberParams().orderBy"
                           (change)="loadMembers()">
                    <label class="form-check-label" for="orderByLastActive">Last active</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input"
                           type="radio"
                           name="orderBy"
                           id="orderByCreated"
                           value="created"
                           [(ngModel)]="memberService.memberParams().orderBy"
                           (change)="loadMembers()">
                    <label class="form-check-label" for="orderByCreated">Newest Members</label>
                </div>
            </div>

        </form>
    </div>

    @for (member of memberService.paginatedResults()?.items; track member.id) {
        <div class="col-2">
            <app-member-card [member]="member"></app-member-card>
        </div>
    }
    
</div>

@if (memberService.paginatedResults()?.pagination) {
    <div class="d-flex justify-content-center">
        <pagination
            [boundaryLinks]="true"
            [totalItems]="memberService.paginatedResults()?.pagination!.totalItems"
            [itemsPerPage]="memberService.paginatedResults()?.pagination!.itemsPerPage"
            (pageChanged)="pageChanged($event)"
            [(ngModel)]="memberService.paginatedResults()?.pagination!.currentPage"
            [maxSize]="10"
            previousText="&lsaquo;"
            nextText="&rsaquo;"
            firstText="&laquo;"
            lastText="&raquo;">

        </pagination>
    </div>
}
